<!doctype html>
<html lang="ru-RU">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Лабораторная работа №25. Современный JavaScript</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<div class="container">
			<h1>Лабораторная работа №25. Современный JavaScript</h1>
			<h2>Современный JavaScript</h2>
			<div class="converter">
				<div class="shadow-dance-container">
					<h1 class="shadow-dance-text">Конвертор из USD</h1>
				</div>
				<input
					type="number"
					id="amount"
					placeholder="Введите сумму в USD..."
					min="0"
				/>
				<div class="into">
					<p>В</p>
					<select id="currency">
						<option value="eur">EUR</option>
						<option value="rub">RUB</option>
					</select>
				</div>
				<button id="convertBtn">Конвертировать</button>
				<p id="result"></p>
			</div>
		</div>
		<script type="module" src="js/api.js"></script>
	</body>
</html>
